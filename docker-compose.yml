name: eprodutos-mcp

services:
  eprodutos-mcp:
    image: ${EPRODUTOS_IMAGE:-eprodutos-mcp:latest}
    build:
      context: .
      dockerfile: EprodutosAgents/Dockerfile
    env_file:
      - ${EPRODUTOS_ENV_FILE:-./EprodutosAgents/eprodutos.env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${EPRODUTOS_MCP_BIND_ADDRESS:-127.0.0.1}:${EPRODUTOS_MCP_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
